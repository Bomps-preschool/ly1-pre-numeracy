<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>More and Less</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:#eef7ff;
overflow:hidden;
height:100vh;
border:6px solid #FFD700;
}

/* SPLASH SCREEN */

#splashScreen{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:white;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:9999;
}

#splashScreen img{
width:250px;
max-width:80%;
}

#splashScreen h1{
margin-top:20px;
font-size:48px;
color:#1f4e79;
}

/* GAME AREA */

#gameContainer{
display:none;
padding:15px;
height:100vh;
}

.topBar{
background:white;
border-radius:20px;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
margin-bottom:15px;
}

.scoreBox{
font-size:22px;
font-weight:bold;
color:#333;
}

.controls{
display:flex;
gap:10px;
}

.controls button{
background:#4CAF50;
color:white;
border:none;
padding:10px 15px;
border-radius:10px;
font-size:16px;
cursor:pointer;
}

.controls button:hover{
opacity:.9;
}

#questionText{
text-align:center;
font-size:42px;
font-weight:bold;
color:#1f4e79;
margin-top:10px;
margin-bottom:20px;
}

/* GROUPS */

#groupsContainer{
display:flex;
justify-content:center;
gap:30px;
}

.groupCard{
width:46%;
background:white;
border-radius:25px;
padding:20px;
min-height:330px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
display:flex;
flex-direction:column;
justify-content:space-between;
align-items:center;
}

.items{
display:flex;
flex-wrap:wrap;
justify-content:center;
align-items:center;
gap:15px;
width:100%;
padding-top:10px;
}

/* BIGGER IMAGES */

.items img{
width:95px;
height:95px;
object-fit:contain;
}

/* TICK CIRCLE */

.selectCircle{
width:90px;
height:90px;
border:5px solid #555;
border-radius:50%;
cursor:pointer;
transition:.3s;
background:white;
}

.selectCircle:hover{
transform:scale(1.05);
}

.correct{
background:#b9ffb9 !important;
border-color:#0a9f00 !important;
}

.wrong{
background:#ffd6d6 !important;
border-color:red !important;
}

.hintGlow{
animation:glow 1s infinite;
}

@keyframes glow{

0%{
box-shadow:0 0 5px gold;
}

50%{
box-shadow:0 0 30px gold;
}

100%{
box-shadow:0 0 5px gold;
}

}

/* RETRY */

#retryBox{
text-align:center;
font-size:28px;
font-weight:bold;
color:#d35400;
margin-top:15px;
}

/* CONFETTI */

#confetti{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
z-index:999;
}

.confettiPiece{
position:absolute;
width:12px;
height:12px;
animation:fall 3s linear forwards;
}

@keyframes fall{

0%{
transform:translateY(-50px);
opacity:1;
}

100%{
transform:translateY(100vh) rotate(720deg);
opacity:0;
}

}

/* END SCREEN */

#endScreen{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:white;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:10000;
}

#endScreen h1{
font-size:60px;
color:#2e8b57;
text-align:center;
margin-bottom:20px;
}

#finalScore{
font-size:42px;
margin-bottom:20px;
}

#playAgainBtn{
background:#28a745;
color:white;
border:none;
padding:15px 35px;
font-size:24px;
border-radius:15px;
cursor:pointer;
}

/* MOBILE */

@media(max-width:900px){

#groupsContainer{
flex-direction:column;
align-items:center;
}

.groupCard{
width:95%;
}

.items img{
width:90px;
height:90px;
}

#questionText{
font-size:30px;
}

}

</style>
</head>

<body>

<div id="confetti"></div>

<div id="splashScreen">

<img src="assets/innovinelogo.png">

<h1>More and Less</h1>

</div>

<div id="gameContainer">

<div class="topBar">

<div class="scoreBox">
Score: <span id="score">0</span>/8
</div>

<div class="controls">

<button id="muteBtn">
🔊 Mute
</button>

<button id="restartBtn">
🔄 Restart
</button>

</div>

</div>

<h2 id="questionText"></h2>

<div id="groupsContainer">

<div class="groupCard">

<div id="leftItems" class="items"></div>

<div id="leftCircle"
class="selectCircle"></div>

</div>

<div class="groupCard">

<div id="rightItems"
class="items"></div>

<div id="rightCircle"
class="selectCircle"></div>

</div>

</div>

<div id="retryBox">
Retry Remaining: 1
</div>

</div>

<div id="endScreen">

<h1>
🎉 You Have Done a Great Job! 🎉
</h1>

<div id="finalScore"></div>

<button id="playAgainBtn">
Play Again
</button>

</div>
<script>

// =======================
// QUESTIONS
// Preschool Friendly
// Only 1–5 Objects
// =======================

const questions = [

{
instruction:"Tap the group that has more apples.",
image:"apple.png",
leftCount:2,
rightCount:4,
correct:"right"
},

{
instruction:"Tap the group that has less balloons.",
image:"balloon.png",
leftCount:5,
rightCount:2,
correct:"right"
},

{
instruction:"Tap the group that has more ducks.",
image:"duck.png",
leftCount:2,
rightCount:5,
correct:"right"
},

{
instruction:"Tap the group that has less flowers.",
image:"flower.png",
leftCount:4,
rightCount:2,
correct:"right"
},

{
instruction:"Tap the group that has more stars.",
image:"star.png",
leftCount:2,
rightCount:5,
correct:"right"
},

{
instruction:"Tap the group that has less fish.",
image:"fish.png",
leftCount:5,
rightCount:2,
correct:"right"
},

{
instruction:"Tap the group that has more footballs.",
image:"football.png",
leftCount:2,
rightCount:4,
correct:"right"
},

{
instruction:"Tap the group that has less butterflies.",
image:"butterfly.png",
leftCount:5,
rightCount:2,
correct:"right"
}

];

// =======================
// GAME VARIABLES
// =======================

let currentQuestion = 0;
let score = 0;
let attempts = 0;
let retryRemaining = 1;
let muted = false;

let voiceRepeatTimer;

// =======================
// ELEMENTS
// =======================

const splashScreen =
document.getElementById("splashScreen");

const gameContainer =
document.getElementById("gameContainer");

const leftItems =
document.getElementById("leftItems");

const rightItems =
document.getElementById("rightItems");

const leftCircle =
document.getElementById("leftCircle");

const rightCircle =
document.getElementById("rightCircle");

const questionText =
document.getElementById("questionText");

const retryBox =
document.getElementById("retryBox");

const scoreDisplay =
document.getElementById("score");

const muteBtn =
document.getElementById("muteBtn");

const restartBtn =
document.getElementById("restartBtn");

const endScreen =
document.getElementById("endScreen");

const finalScore =
document.getElementById("finalScore");

const playAgainBtn =
document.getElementById("playAgainBtn");

// =======================
// VOICE INSTRUCTIONS
// Web Speech API
// =======================

function speak(text){

if(muted) return;

speechSynthesis.cancel();

const speech =
new SpeechSynthesisUtterance(text);

speech.rate = 0.85;
speech.pitch = 1.1;
speech.volume = 1;

speechSynthesis.speak(speech);

}

// =======================
// REPEAT VOICE EVERY 5 SEC
// =======================

function startVoiceRepeat(text){

clearInterval(
voiceRepeatTimer
);

voiceRepeatTimer =
setInterval(()=>{

if(!muted){

speak(text);

}

},5000);

}

function stopVoiceRepeat(){

clearInterval(
voiceRepeatTimer
);

}

// =======================
// CORRECT SOUND
// =======================

function playCorrectSound(){

if(muted) return;

const audioCtx =
new (window.AudioContext ||
window.webkitAudioContext)();

const osc =
audioCtx.createOscillator();

const gain =
audioCtx.createGain();

osc.type = "sine";

osc.frequency.value = 800;

osc.connect(gain);

gain.connect(
audioCtx.destination
);

osc.start();

gain.gain.setValueAtTime(
0.3,
audioCtx.currentTime
);

gain.gain.exponentialRampToValueAtTime(
0.0001,
audioCtx.currentTime + 0.5
);

osc.stop(
audioCtx.currentTime + 0.5
);

}

// =======================
// WRONG SOUND
// =======================

function playWrongSound(){

if(muted) return;

const audioCtx =
new (window.AudioContext ||
window.webkitAudioContext)();

const osc =
audioCtx.createOscillator();

const gain =
audioCtx.createGain();

osc.type = "square";

osc.frequency.value = 220;

osc.connect(gain);

gain.connect(
audioCtx.destination
);

osc.start();

gain.gain.setValueAtTime(
0.3,
audioCtx.currentTime
);

gain.gain.exponentialRampToValueAtTime(
0.0001,
audioCtx.currentTime + 0.5
);

osc.stop(
audioCtx.currentTime + 0.5
);

}

// =======================
// CONFETTI
// =======================

function launchConfetti(){

const container =
document.getElementById(
"confetti"
);

for(let i=0;i<100;i++){

const piece =
document.createElement("div");

piece.classList.add(
"confettiPiece"
);

piece.style.left =
Math.random()*100 + "%";

piece.style.top =
"-20px";

piece.style.background =
`hsl(${Math.random()*360},
100%,50%)`;

piece.style.animationDuration =
(2 + Math.random()*2)
+ "s";

container.appendChild(
piece
);

setTimeout(()=>{

piece.remove();

},4000);

}

}

// =======================
// SPLASH SCREEN
// =======================

setTimeout(()=>{

splashScreen.style.display =
"none";

gameContainer.style.display =
"block";

loadQuestion();

},10000);
//
// =======================
// LOAD QUESTION
// =======================
//

function loadQuestion(){

attempts = 0;
retryRemaining = 1;

retryBox.innerHTML =
"Retry Remaining: 1";

leftCircle.className =
"selectCircle";

rightCircle.className =
"selectCircle";

leftItems.innerHTML = "";
rightItems.innerHTML = "";

const q =
questions[currentQuestion];

questionText.innerHTML =
q.instruction;

// Speak Instruction

speak(
q.instruction
);

// Repeat Instruction

startVoiceRepeat(
q.instruction
);

// LEFT SIDE IMAGES

for(let i=0;
i<q.leftCount;
i++){

const img =
document.createElement("img");

img.src =
"assets/" + q.image;

img.onerror = function(){

this.style.display =
"none";

};

leftItems.appendChild(
img
);

}

// RIGHT SIDE IMAGES

for(let i=0;
i<q.rightCount;
i++){

const img =
document.createElement("img");

img.src =
"assets/" + q.image;

img.onerror = function(){

this.style.display =
"none";

};

rightItems.appendChild(
img
);

}

}

//
// =======================
// SELECT LEFT
// =======================
//

leftCircle.addEventListener(
"click",
()=>{

checkAnswer(
"left"
);

}
);

//
// =======================
// SELECT RIGHT
// =======================
//

rightCircle.addEventListener(
"click",
()=>{

checkAnswer(
"right"
);

}
);

//
// =======================
// CHECK ANSWER
// =======================
//

function checkAnswer(
selectedSide
){

const q =
questions[currentQuestion];

if(
selectedSide ===
q.correct
){

handleCorrect();

}
else{

handleWrong();

}

}

//
// =======================
// CORRECT ANSWER
// =======================
//

function handleCorrect(){

stopVoiceRepeat();

playCorrectSound();

launchConfetti();

score++;

scoreDisplay.innerHTML =
score;

const q =
questions[currentQuestion];

if(
q.correct ===
"left"
){

leftCircle.classList.add(
"correct"
);

}
else{

rightCircle.classList.add(
"correct"
);

}

speak(
"Great Job!"
);

setTimeout(()=>{

nextQuestion();

},2000);

}

//
// =======================
// WRONG ANSWER
// =======================
//

function handleWrong(){

attempts++;

playWrongSound();

if(
attempts === 1
){

retryRemaining = 0;

retryBox.innerHTML =
"Retry Remaining: 0";

showHint();

speak(
"Try again"
);

return;

}

showCorrectAnswer();

}

//
// =======================
// HINT SYSTEM
// =======================
//

function showHint(){

const q =
questions[currentQuestion];

if(
q.correct ===
"left"
){

leftCircle.classList.add(
"hintGlow"
);

}
else{

rightCircle.classList.add(
"hintGlow"
);

}

}

//
// =======================
// SHOW CORRECT ANSWER
// =======================
//

function showCorrectAnswer(){

stopVoiceRepeat();

const q =
questions[currentQuestion];

if(
q.correct ===
"left"
){

leftCircle.classList.remove(
"hintGlow"
);

leftCircle.classList.add(
"correct"
);

}
else{

rightCircle.classList.remove(
"hintGlow"
);

rightCircle.classList.add(
"correct"
);

}

speak(
"This is the correct answer."
);

setTimeout(()=>{

nextQuestion();

},2500);

}

//
// =======================
// NEXT QUESTION
// =======================
//

function nextQuestion(){

currentQuestion++;

if(
currentQuestion >=
questions.length
){

showEndScreen();

return;

}

loadQuestion();

}
//
// =======================
// END SCREEN
// =======================
//

function showEndScreen(){

stopVoiceRepeat();

gameContainer.style.display =
"none";

endScreen.style.display =
"flex";

finalScore.innerHTML =
"Your Score: " +
score +
" / " +
questions.length;

launchConfetti();

speak(
"You have done a great job. Play again."
);

}

//
// =======================
// PLAY AGAIN
// =======================
//

playAgainBtn.addEventListener(
"click",
function(){

currentQuestion = 0;
score = 0;

scoreDisplay.innerHTML =
"0";

endScreen.style.display =
"none";

gameContainer.style.display =
"block";

loadQuestion();

}
);

//
// =======================
// RESTART BUTTON
// =======================
//

restartBtn.addEventListener(
"click",
function(){

speechSynthesis.cancel();

currentQuestion = 0;
score = 0;

scoreDisplay.innerHTML =
"0";

loadQuestion();

}
);

//
// =======================
// MUTE / UNMUTE
// =======================
//

muteBtn.addEventListener(
"click",
function(){

muted = !muted;

if(muted){

speechSynthesis.cancel();

muteBtn.innerHTML =
"🔇 Unmute";

}
else{

muteBtn.innerHTML =
"🔊 Mute";

speak(
questions[currentQuestion]
.instruction
);

}

}
);

//
// =======================
// PREVENT DOUBLE TAPS
// =======================
//

let clickLock = false;

const oldCheckAnswer =
checkAnswer;

checkAnswer = function(side){

if(clickLock) return;

clickLock = true;

setTimeout(function(){

clickLock = false;

},800);

oldCheckAnswer(side);

};

//
// =======================
// KEYBOARD SUPPORT
// =======================
//

document.addEventListener(
"keydown",
function(e){

if(
e.key === "m" ||
e.key === "M"
){

muteBtn.click();

}

if(
e.key === "r" ||
e.key === "R"
){

restartBtn.click();

}

}
);

//
// =======================
// START VALUES
// =======================
//

scoreDisplay.innerHTML =
"0";

//
// =======================
// DEBUG
// =======================
//

console.log(
"More and Less Game Ready"
);

</script>

</body>
</html>
